services:
  api:
    build: 
      context: ..
      dockerfile: ./docker/Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    volumes:
      - ..:/app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - test_postgres
    environment:
      DATABASE_URL: postgresql+asyncpg://swift_user:swift_pass@postgres:5432/swift_db
      SWIFT_CODES_PATH: /app/app/data/Interns_2025_SWIFT_CODES.xlsx  
      TEST_DB_HOST: test_postgres
      TEST_DB_PORT: 5433
      TEST_DB_USER: swift_user
      TEST_DB_PASS: swift_pass
      TEST_DB_NAME: test_swift_db 
    working_dir: /app
    restart: unless-stopped

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: swift_user
      POSTGRES_PASSWORD: swift_pass
      POSTGRES_DB: swift_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  test_postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: swift_user
      POSTGRES_PASSWORD: swift_pass
      POSTGRES_DB: test_swift_db
    ports:
      - "5433:5432"
    volumes:
      - test_pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  test_pgdata: