name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: swift_user
          POSTGRES_PASSWORD: swift_pass
          POSTGRES_DB: swift_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install

      - name: Wait for PostgreSQL to be ready
        run: |
          sleep 10  
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done

      - name: Install pytest-asyncio and mock libraries
        run: poetry add pytest-asyncio pytest-mock

      - name: Run tests with database mocking
        env:
          USE_DB_MOCK: "true"
        run: |
          poetry run pytest tests/unit tests/integration -v

      - name: Run Ruff linter
        run: |
          poetry run ruff check .